name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.id }}
      upload-url: ${{ steps.create-release.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Kyro IDE ${{ github.ref_name }}'
          body: |
            ## 🚀 Kyro IDE ${{ steps.get_version.outputs.VERSION }}

            ### 📥 Downloads

            Choose the installer for your platform:

            | Platform | Download |
            |----------|----------|
            | **Windows** | `.exe` (NSIS) or `.msi` |
            | **macOS (Apple Silicon)** | `_aarch64.dmg` |
            | **macOS (Intel)** | `_x64.dmg` |
            | **Linux** | `.AppImage` or `.deb` |

            ### 📋 Installation

            **Windows:**
            1. Download `Kyro-IDE_x64-setup.exe`
            2. Run the installer
            3. Launch Kyro IDE from Start Menu

            **macOS:**
            1. Download the `.dmg` for your Mac (M1/M2 use `_aarch64`, Intel use `_x64`)
            2. Open DMG and drag to Applications
            3. Launch from Applications

            **Linux:**
            ```bash
            # AppImage (works on all distros)
            chmod +x Kyro-IDE_*_amd64.AppImage
            ./Kyro-IDE_*_amd64.AppImage

            # Debian/Ubuntu
            sudo dpkg -i Kyro-IDE_*_amd64.deb
            ```

            **Full Changelog**: https://github.com/nkpendyam/Kyro_IDE/commits/${{ github.ref_name }}
          draft: ${{ github.event.inputs.draft == 'true' || github.event_name == 'workflow_dispatch' }}
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            name: 'macos-arm64'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            name: 'macos-x64'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            name: 'linux-x64'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            name: 'windows-x64'

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Build Tauri app
        run: bun run tauri build --target ${{ matrix.target }}

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: kyro-ide-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: kyro-ide-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: kyro-ide-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

  upload-release-assets:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
