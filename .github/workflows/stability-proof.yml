name: Stability Proof

'on':
  workflow_dispatch:
    inputs:
      iterations:
        description: "Number of stability loop iterations"
        required: false
        default: "5"
  push:
    branches: [main]

jobs:
  stability:
    name: Stability Loop
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Ensure frontendDist for Tauri
        run: |
          mkdir -p out
          if [ ! -f out/index.html ]; then
            echo '<!doctype html><html><body>Kyro IDE CI placeholder</body></html>' > out/index.html
          fi

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Stability Loop
        run: |
          chmod +x scripts/stability-proof.sh
          ITERATIONS="${{ github.event.inputs.iterations || '5' }}"
          scripts/stability-proof.sh "$ITERATIONS" stability-report.json

      - name: Publish Stability Summary
        run: |
          echo "## Stability Proof" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat stability-report.json >> $GITHUB_STEP_SUMMARY

      - name: Upload Stability Report
        uses: actions/upload-artifact@v4
        with:
          name: stability-report
          path: stability-report.json
