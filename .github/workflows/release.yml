name: Kyro IDE Release Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Release (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            label: windows-x64
            target: x86_64-pc-windows-msvc
            artifact_name: kyro-ide-windows-x64
            artifact_glob: src-tauri/target/release/bundle/msi/*.msi
          - os: macos-14
            label: macos-arm64
            target: aarch64-apple-darwin
            artifact_name: kyro-ide-macos-arm64
            artifact_glob: src-tauri/target/release/bundle/dmg/*.dmg
          - os: ubuntu-22.04
            label: linux-x64
            target: x86_64-unknown-linux-gnu
            artifact_name: kyro-ide-linux-x64
            artifact_glob: src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend (exports out/)
        run: bun run build

      - name: Build Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Kyro IDE ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
