name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: notes
        run: |
          cat > release_notes.md << 'EOF'
          ## 🚀 Kyro IDE ${{ steps.get_version.outputs.VERSION }}

          ### 📥 Downloads

          Download the latest version from the repository:

          ```bash
          git clone https://github.com/nkpendyam/Kyro_IDE.git
          cd Kyro_IDE
          bun install
          bun run dev
          ```

          ### 📋 What's Changed

          EOF
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null)..HEAD >> release_notes.md || echo "- Initial release" >> release_notes.md

          cat >> release_notes.md << 'EOF'

          ### 🖥️ Desktop App

          To build the desktop application locally:

          ```bash
          # Prerequisites: Rust, Bun, and platform-specific dependencies
          # See DESKTOP_BUILD.md for detailed instructions

          bun install
          bun run tauri:build
          ```

          **Full Changelog**: https://github.com/nkpendyam/Kyro_IDE/commits/${{ steps.get_version.outputs.VERSION }}
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
