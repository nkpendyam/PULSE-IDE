name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: false

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x64
          - os: macos-latest
            target: aarch64-apple-darwin
            arch: arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            arch: x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (Ubuntu only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Kyro IDE ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --target ${{ matrix.target }}

  # Web build for Vercel deployment
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        run: bun run build

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: .next/

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-tauri
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: notes
        run: |
          cat > release_notes.md << 'EOF'
          ## 🚀 Kyro IDE ${{ steps.get_version.outputs.VERSION }}

          ### 📦 Downloads

          | Platform | Download |
          |----------|----------|
          | **Windows** | `.exe` (NSIS installer) or `.msi` |
          | **macOS (Apple Silicon)** | `.dmg` or `.app.tar.gz` |
          | **macOS (Intel)** | `.dmg` or `.app.tar.gz` |
          | **Linux** | `.AppImage` (universal) or `.deb` |

          ### 📋 What's Changed

          EOF
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null)..HEAD >> release_notes.md || echo "- Initial release" >> release_notes.md

          cat >> release_notes.md << 'EOF'

          ### 🔧 Installation

          **Windows:**
          1. Download `Kyro-IDE_x64-setup.exe` or `Kyro-IDE_x64_en-US.msi`
          2. Run the installer and follow the prompts

          **macOS:**
          1. Download `Kyro-IDE_aarch64.dmg` (Apple Silicon) or `Kyro-IDE_x64.dmg` (Intel)
          2. Open the DMG and drag Kyro IDE to Applications

          **Linux:**
          ```bash
          # AppImage (recommended - works on all distros)
          chmod +x Kyro-IDE_*_amd64.AppImage
          ./Kyro-IDE_*_amd64.AppImage

          # Debian/Ubuntu
          sudo dpkg -i Kyro-IDE_*_amd64.deb
          ```

          ### 🛠️ Build from Source

          ```bash
          git clone https://github.com/nkpendyam/Kyro_IDE.git
          cd Kyro_IDE
          bun install
          bun run tauri:dev
          ```

          **Full Changelog**: https://github.com/nkpendyam/Kyro_IDE/compare/...${{ steps.get_version.outputs.VERSION }}
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: true
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, '-') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
